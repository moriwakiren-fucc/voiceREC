<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="録音">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0f">
  <title>REC — バックグラウンド録音</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c26;
      --border: rgba(255,255,255,0.08);
      --text: #f0f0f5;
      --muted: rgba(240,240,245,0.45);
      --accent: #e84040;
      --accent-glow: rgba(232,64,64,0.25);
      --green: #3ecf8e;
      --amber: #f5a623;
      --mono: 'DM Mono', monospace;
      --display: 'Syne', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px 12px;
    }
    .logo {
      font-family: var(--display);
      font-weight: 800;
      font-size: 20px;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .logo span { color: var(--accent); }
    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 4px 10px;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .dot.recording { background: var(--accent); animation: pulse-dot 1s infinite; }
    .dot.paused { background: var(--amber); }
    @keyframes pulse-dot {
      0%,100% { opacity: 1; } 50% { opacity: 0.3; }
    }

    /* ── Waveform ── */
    .waveform-wrap {
      position: relative;
      flex: 0 0 auto;
      height: 120px;
      margin: 8px 0;
      overflow: hidden;
    }
    #waveCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Timer ── */
    .timer-section {
      text-align: center;
      padding: 12px 24px 20px;
    }
    .timer {
      font-family: var(--display);
      font-weight: 700;
      font-size: clamp(52px, 14vw, 80px);
      letter-spacing: -2px;
      line-height: 1;
      color: var(--text);
      transition: color 0.3s;
    }
    .timer.recording { color: var(--accent); }
    .timer-label {
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-top: 6px;
      text-transform: uppercase;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 8px 24px 24px;
    }
    .btn-circle {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      -webkit-appearance: none;
      outline: none;
    }
    .btn-circle:active { transform: scale(0.92); }
    .btn-circle:disabled { opacity: 0.3; pointer-events: none; }
    .btn-circle svg { width: 22px; height: 22px; }

    .btn-rec {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      box-shadow: 0 0 0 0 var(--accent-glow);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s, box-shadow 0.3s;
      -webkit-appearance: none;
      outline: none;
      position: relative;
    }
    .btn-rec.recording {
      box-shadow: 0 0 0 12px var(--accent-glow);
      animation: rec-pulse 2s infinite;
    }
    @keyframes rec-pulse {
      0%,100% { box-shadow: 0 0 0 8px var(--accent-glow); }
      50% { box-shadow: 0 0 0 20px rgba(232,64,64,0.08); }
    }
    .btn-rec:active { transform: scale(0.93); }
    .rec-icon { width: 28px; height: 28px; }
    .rec-square {
      width: 26px; height: 26px;
      border-radius: 5px;
      background: white;
      transition: border-radius 0.2s;
    }
    .btn-rec.recording .rec-square { border-radius: 3px; }

    /* ── Notice Banner ── */
    .notice {
      margin: 0 16px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--amber);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      line-height: 1.5;
      color: var(--muted);
      display: none;
    }
    .notice.show { display: block; }
    .notice strong { color: var(--amber); font-weight: 500; }

    /* ── Recordings List ── */
    .list-section {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 24px;
      -webkit-overflow-scrolling: touch;
    }
    .list-header {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 8px 8px 12px;
    }
    .recording-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
      color: inherit;
    }
    .recording-item:active { background: var(--surface2); }
    .item-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 16px;
    }
    .item-info { flex: 1; min-width: 0; }
    .item-name {
      font-size: 14px;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .item-meta {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      gap: 10px;
    }
    .item-actions {
      display: flex;
      gap: 8px;
    }
    .action-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      -webkit-appearance: none;
      outline: none;
      transition: color 0.15s, background 0.15s;
    }
    .action-btn:active { background: var(--surface2); color: var(--text); }
    .action-btn svg { width: 15px; height: 15px; }
    .action-btn.playing { color: var(--green); }
    .action-btn.danger:active { color: var(--accent); }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
    }
    .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }

    /* ── Visualizer bars ── */
    .bars-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      height: 36px;
    }
    .bar {
      width: 3px;
      border-radius: 2px;
      background: var(--accent);
      height: 4px;
      transition: height 0.08s;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom) + 24px);
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 10px 20px;
      font-size: 13px;
      white-space: nowrap;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 100;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Scrollbar */
    .list-section::-webkit-scrollbar { width: 3px; }
    .list-section::-webkit-scrollbar-track { background: transparent; }
    .list-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Name Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal-sheet {
      width: 100%; max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 20px 20px 0 0;
      padding: 20px 20px calc(env(safe-area-inset-bottom) + 20px);
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
    }
    .modal-overlay.show .modal-sheet { transform: translateY(0); }
    .modal-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 18px;
    }
    .modal-title {
      font-family: var(--display);
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 14px;
      color: var(--text);
    }
    .modal-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-family: var(--mono);
      font-size: 14px;
      color: var(--text);
      outline: none;
      -webkit-appearance: none;
      margin-bottom: 14px;
      transition: border-color 0.15s;
    }
    .modal-input:focus { border-color: var(--accent); }
    .modal-hint {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .modal-hint span { color: var(--amber); }
    .modal-btns {
      display: flex; gap: 10px;
    }
    .modal-btn {
      flex: 1; padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 13px;
      cursor: pointer;
      -webkit-appearance: none;
      outline: none;
      transition: background 0.15s;
    }
    .modal-btn.cancel { background: var(--surface2); color: var(--muted); }
    .modal-btn.confirm { background: var(--accent); color: white; border-color: var(--accent); font-weight: 500; }
    .modal-btn:active { opacity: 0.8; }
    .item-name-btn {
      background: none; border: none; color: inherit;
      font-family: var(--mono); font-size: 14px;
      text-align: left; cursor: pointer; padding: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      width: 100%; margin-bottom: 3px;
      -webkit-appearance: none; outline: none;
    }
    .item-name-btn:active { color: var(--accent); }
  </style>
</head>
<body>

<div class="header">
  <div class="logo"><span>●</span> REC</div>
  <div class="status-pill">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">待機中</span>
  </div>
</div>

<div class="waveform-wrap">
  <canvas id="waveCanvas"></canvas>
</div>

<div class="timer-section">
  <div class="timer" id="timer">00:00</div>
  <div class="timer-label" id="timerLabel">録音時間</div>
</div>

<div class="notice" id="bgNotice">
  <strong>📱 iPadをロックする前に：</strong>
  ホーム画面に追加してフルスクリーンで開くと、バックグラウンド録音が継続されます。スリープ中も録音は継続します。
</div>

<div class="controls">
  <button class="btn-circle" id="btnPause" disabled title="一時停止">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
    </svg>
  </button>

  <button class="btn-rec" id="btnRec" title="録音開始">
    <div class="rec-square"></div>
  </button>

  <button class="btn-circle" id="btnSave" disabled title="保存">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
  </button>
</div>

<div class="list-section">
  <div class="list-header">録音一覧</div>
  <div id="recordingsList">
    <div class="empty-state">
      <div class="empty-icon">🎙</div>
      録音がありません<br>
      <span style="font-size:11px">● ボタンを押して録音を開始</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ファイル名入力モーダル -->
<div class="modal-overlay" id="nameModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">ファイル名を入力</div>
    <input class="modal-input" id="nameInput" type="text" maxlength="60" autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="modal-hint" id="modalHint"></div>
    <div class="modal-btns">
      <button class="modal-btn cancel" id="modalCancel">キャンセル</button>
      <button class="modal-btn confirm" id="modalConfirm">保存</button>
    </div>
  </div>
</div>

<!-- lamejs: pure-JS MP3 encoder, no WASM needed, works on iOS Safari -->
<script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
<script>
// ── State ──────────────────────────────────────────
let audioContext = null;
let analyser = null;
let sourceNode = null;
let stream = null;
let mediaRecorder = null;
let audioChunks = [];
let silentAudio = null;
let timerInterval = null;
let seconds = 0;
let isRecording = false;
let isPaused = false;
let recordings = JSON.parse(localStorage.getItem('recordings') || '[]');
let currentPlayback = null;
let waveHistory = new Float32Array(300).fill(0);

const MP3_BITRATE = 128;

// ── Silent Audio（iOSオーディオセッション維持）──────────────────────────────────────────
// iOSはオーディオ出力がないとバックグラウンドでオーディオ処理を止める。
// 無音WAVをloop再生することでセッションを「アクティブ」に保つ。
function createSilentAudio() {
  // 60分分の無音バッファを生成。
  // ループの繋ぎ目回数を最小化（2時間録音でも2回のみ）。
  // 無音データはすべて0なのでメモリ消費はほぼゼロ。
  const sr = 44100, n = sr * 60 * 60; // 60分
  const buf = new ArrayBuffer(44 + n * 2);
  const v = new DataView(buf);
  const w = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  w(0,'RIFF'); v.setUint32(4, 36 + n*2, true);
  w(8,'WAVE'); w(12,'fmt ');
  v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
  v.setUint32(24,sr,true); v.setUint32(28,sr*2,true);
  v.setUint16(32,2,true); v.setUint16(34,16,true);
  w(36,'data'); v.setUint32(40,n*2,true);
  const blob = new Blob([buf], { type: 'audio/wav' });
  const audio = new Audio(URL.createObjectURL(blob));
  audio.loop = true;
  audio.volume = 0.001; // 0だとiOSが最適化で止める
  return audio;
}

// ── DOM ──────────────────────────────────────────
const btnRec = document.getElementById('btnRec');
const btnPause = document.getElementById('btnPause');
const btnSave = document.getElementById('btnSave');
const timerEl = document.getElementById('timer');
const timerLabel = document.getElementById('timerLabel');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const bgNotice = document.getElementById('bgNotice');
const listEl = document.getElementById('recordingsList');
const toast = document.getElementById('toast');
const canvas = document.getElementById('waveCanvas');
const ctx = canvas.getContext('2d');

// ── Canvas resize ──────────────────────────────────────────
function resizeCanvas() {
  canvas.width = canvas.offsetWidth * window.devicePixelRatio;
  canvas.height = canvas.offsetHeight * window.devicePixelRatio;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── Waveform drawing ──────────────────────────────────────────
function drawWave() {
  const W = canvas.width, H = canvas.height;
  const dpr = window.devicePixelRatio || 1;
  ctx.clearRect(0, 0, W, H);

  if (analyser && isRecording && !isPaused) {
    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteTimeDomainData(data);
    let sum = 0;
    for (let i = 0; i < data.length; i++) sum += Math.pow((data[i] - 128) / 128, 2);
    const rms = Math.sqrt(sum / data.length);
    waveHistory = new Float32Array([...waveHistory.slice(1), rms * 2.5]);
  } else if (!isRecording) {
    waveHistory = new Float32Array(waveHistory.length).fill(0);
  }

  const step = W / waveHistory.length;
  ctx.beginPath();
  ctx.strokeStyle = isRecording && !isPaused ? '#e84040' : '#3a3a4a';
  ctx.lineWidth = 1.5 * dpr;
  ctx.lineCap = 'round';
  for (let i = 0; i < waveHistory.length; i++) {
    const x = i * step;
    const amp = waveHistory[i] * (H / 2) * 0.85;
    ctx.moveTo(x, H / 2 - amp);
    ctx.lineTo(x, H / 2 + amp);
  }
  ctx.stroke();

  ctx.beginPath();
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  ctx.moveTo(0, H / 2);
  ctx.lineTo(W, H / 2);
  ctx.stroke();

  requestAnimationFrame(drawWave);
}
drawWave();

// ── Timer ──────────────────────────────────────────
function fmtTime(s) {
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h > 0) return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}
function startTimer() {
  timerInterval = setInterval(() => { seconds++; timerEl.textContent = fmtTime(seconds); }, 1000);
}
function stopTimer() { clearInterval(timerInterval); }

// ── Float32 → Int16 ──────────────────────────────────────────
function floatTo16BitPCM(f32) {
  const i16 = new Int16Array(f32.length);
  for (let i = 0; i < f32.length; i++) {
    const s = Math.max(-1, Math.min(1, f32[i]));
    i16[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
  }
  return i16;
}

// ── Recording ──────────────────────────────────────────
// 戦略：
//   1. MediaRecorder（iOSネイティブ, m4a/aac）でバックグラウンド録音
//   2. サイレント音声ループでiOSオーディオセッションを維持
//   3. 録音停止後にWeb Audio APIでPCM展開 → lamejs で MP3 へ変換
//
// なぜMediaRecorder？
//   ScriptProcessorはメインスレッド依存 → ロック時に止まる。
//   MediaRecorderはOSレベルのネイティブAPIなのでバックグラウンドでも動作。

async function startRecording() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true }
    });

    // ── AudioContext（可視化のみ）──
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 512;
    sourceNode = audioContext.createMediaStreamSource(stream);
    sourceNode.connect(analyser);

    // ── MediaRecorder（録音本体）──
    // iOSはaudio/mp4(aac)のみサポート。バックグラウンドでも動作するネイティブAPI。
    const mime = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4'
               : MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus'
               : '';
    mediaRecorder = new MediaRecorder(stream, mime ? { mimeType: mime } : {});
    audioChunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.start(500); // 500ms刻みで保存（途中切断対策）

    // ── サイレント音声ループ開始（iOSセッション維持の核心）──
    silentAudio = createSilentAudio();
    await silentAudio.play().catch(() => {});

    isRecording = true;
    isPaused = false;
    seconds = 0;
    timerEl.textContent = '00:00';
    startTimer();
    setUIRecording();
    bgNotice.classList.add('show');

  } catch (err) {
    showToast('マイクへのアクセスが拒否されました');
    console.error(err);
  }
}

function pauseRecording() {
  if (!isRecording) return;
  if (isPaused) {
    mediaRecorder.resume();
    isPaused = false;
    startTimer();
    setUIRecording();
  } else {
    mediaRecorder.pause();
    isPaused = true;
    stopTimer();
    setUIPaused();
  }
}

function stopRecording() {
  if (!isRecording) return;
  isRecording = false;
  isPaused = false;
  stopTimer();

  // サイレント音声停止
  if (silentAudio) { silentAudio.pause(); silentAudio = null; }

  mediaRecorder.stop();
  mediaRecorder.onstop = async () => {
    stream.getTracks().forEach(t => t.stop());
    if (audioContext) { audioContext.close(); audioContext = null; }

    const recMime = mediaRecorder.mimeType || 'audio/mp4';
    const recBlob = new Blob(audioChunks, { type: recMime });
    showToast('MP3に変換中…');

    // ── m4a/webm → PCM → MP3 変換 ──
    try {
      const arrayBuf = await recBlob.arrayBuffer();
      const decodeCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
      const audioBuf = await decodeCtx.decodeAudioData(arrayBuf);
      decodeCtx.close();

      const pcmData = audioBuf.getChannelData(0); // モノラル
      const encoder = new lamejs.Mp3Encoder(1, audioBuf.sampleRate, MP3_BITRATE);
      const mp3Parts = [];
      const chunkSize = 1152;
      for (let i = 0; i < pcmData.length; i += chunkSize) {
        const chunk = floatTo16BitPCM(pcmData.subarray(i, i + chunkSize));
        const enc = encoder.encodeBuffer(chunk);
        if (enc.length > 0) mp3Parts.push(new Uint8Array(enc));
      }
      const final = encoder.flush();
      if (final.length > 0) mp3Parts.push(new Uint8Array(final));

      const mp3Blob = new Blob(mp3Parts, { type: 'audio/mpeg' });
      await saveRecording(mp3Blob);
    } catch (e) {
      // デコード失敗時はネイティブ形式で保存
      console.warn('MP3変換失敗、元形式で保存:', e);
      await saveRecording(recBlob, recMime.includes('mp4') ? 'm4a' : 'webm');
    }
  };

  setUIIdle();
  bgNotice.classList.remove('show');
}

// ── Name Modal ──────────────────────────────────────────
const nameModal = document.getElementById('nameModal');
const nameInput = document.getElementById('nameInput');
const modalTitle = document.getElementById('modalTitle');
const modalHint = document.getElementById('modalHint');
const modalConfirm = document.getElementById('modalConfirm');
const modalCancel = document.getElementById('modalCancel');
let _modalResolve = null;

function openNameModal(defaultName, title = 'ファイル名を入力', hint = '') {
  return new Promise(resolve => {
    _modalResolve = resolve;
    modalTitle.textContent = title;
    modalHint.innerHTML = hint;
    nameInput.value = defaultName;
    nameModal.classList.add('show');
    setTimeout(() => { nameInput.focus(); nameInput.select(); }, 300);
  });
}
function closeNameModal(result) {
  nameModal.classList.remove('show');
  if (_modalResolve) { _modalResolve(result); _modalResolve = null; }
}
modalConfirm.addEventListener('click', () => {
  const v = nameInput.value.trim();
  if (v) closeNameModal(v);
});
modalCancel.addEventListener('click', () => closeNameModal(null));
nameInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { const v = nameInput.value.trim(); if (v) closeNameModal(v); }
  if (e.key === 'Escape') closeNameModal(null);
});
nameModal.addEventListener('click', e => { if (e.target === nameModal) closeNameModal(null); });

// ── 重複チェック & 連番付与 ──────────────────────────────────────────
function resolveUniqueName(name, excludeId = null) {
  const existing = recordings.filter(r => r.id !== excludeId).map(r => r.name);
  if (!existing.includes(name)) return name;
  let i = 2;
  while (existing.includes(`${name}_${i}`)) i++;
  return `${name}_${i}`;
}

// ── Save Recording ──────────────────────────────────────────
async function saveRecording(blob, ext = 'mp3') {
  const dur = seconds;
  const defaultName = `録音_${new Date().toLocaleString('ja-JP',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).replace(/[\/\s:]/g,'-')}`;

  const inputName = await openNameModal(
    defaultName,
    'ファイル名を入力',
    '重複する名前は自動で <span>_2, _3…</span> が付きます'
  );
  if (!inputName) { showToast('保存をキャンセルしました'); return; }

  const name = resolveUniqueName(inputName.replace(/[/\\:*?"<>|]/g, '_'));
  const rec = { id: Date.now(), name, duration: dur, ext, size: blob.size, date: new Date().toISOString() };

  await new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = () => {
      rec.b64 = reader.result;
      recordings.unshift(rec);
      try { localStorage.setItem('recordings', JSON.stringify(recordings)); } catch(e) {
        showToast('容量不足: すぐにダウンロードしてください');
      }
      renderList();
      showToast(`「${name}」を保存しました ✓`);
      resolve();
    };
    reader.readAsDataURL(blob);
  });
}

// ── Rename Recording ──────────────────────────────────────────
async function renameRecording(i) {
  const rec = recordings[i];
  const inputName = await openNameModal(
    rec.name,
    'ファイル名を変更',
    '重複する名前は自動で <span>_2, _3…</span> が付きます'
  );
  if (!inputName || inputName.trim() === rec.name) return;
  const name = resolveUniqueName(inputName.trim().replace(/[/\\:*?"<>|]/g, '_'), rec.id);
  recordings[i].name = name;
  try { localStorage.setItem('recordings', JSON.stringify(recordings)); } catch(e) {}
  renderList();
  showToast(`「${name}」に変更しました`);
}

// ── UI states ──────────────────────────────────────────
function setUIRecording() {
  btnRec.classList.add('recording');
  statusDot.className = 'dot recording';
  statusText.textContent = '録音中';
  timerEl.classList.add('recording');
  timerLabel.textContent = '録音時間';
  btnPause.disabled = false;
  btnSave.disabled = false;
  btnPause.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;
}
function setUIPaused() {
  btnRec.classList.remove('recording');
  statusDot.className = 'dot paused';
  statusText.textContent = '一時停止';
  timerEl.classList.remove('recording');
  timerLabel.textContent = '経過時間（停止中）';
  btnPause.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5,3 19,12 5,21"/></svg>`;
}
function setUIIdle() {
  btnRec.classList.remove('recording');
  statusDot.className = 'dot';
  statusText.textContent = '待機中';
  timerEl.classList.remove('recording');
  timerEl.textContent = '00:00';
  timerLabel.textContent = '録音時間';
  btnPause.disabled = true;
  btnSave.disabled = true;
  btnPause.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;
}

// ── Button handlers ──────────────────────────────────────────
btnRec.addEventListener('click', () => { if (!isRecording) startRecording(); });
btnPause.addEventListener('click', () => { if (isRecording) pauseRecording(); });
btnSave.addEventListener('click', () => { if (isRecording) stopRecording(); });

// ── Render list ──────────────────────────────────────────
function renderList() {
  if (recordings.length === 0) {
    listEl.innerHTML = `<div class="empty-state"><div class="empty-icon">🎙</div>録音がありません<br><span style="font-size:11px">● ボタンを押して録音を開始</span></div>`;
    return;
  }
  listEl.innerHTML = recordings.map((r, i) => `
    <div class="recording-item" data-i="${i}">
      <div class="item-icon">🎵</div>
      <div class="item-info">
        <button class="item-name-btn" data-rename="${i}" title="タップしてリネーム">${r.name}.mp3</button>
        <div class="item-meta">
          <span>${fmtTime(r.duration)}</span>
          <span>${(r.size/1024).toFixed(0)}KB</span>
          <span>${new Date(r.date).toLocaleDateString('ja-JP',{month:'short',day:'numeric'})}</span>
        </div>
      </div>
      <div class="item-actions">
        <button class="action-btn" data-play="${i}" title="再生" aria-label="再生">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5,3 19,12 5,21"/></svg>
        </button>
        <button class="action-btn" data-dl="${i}" title="ダウンロード" aria-label="ダウンロード">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button class="action-btn danger" data-del="${i}" title="削除" aria-label="削除">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,6 5,6 21,6"/><path d="M19,6v14a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6m3,0V4a1,1,0,0,1,1-1h4a1,1,0,0,1,1,1v2"/></svg>
        </button>
      </div>
    </div>
  `).join('');

  listEl.querySelectorAll('[data-rename]').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); renameRecording(parseInt(btn.dataset.rename)); });
  });
  listEl.querySelectorAll('[data-play]').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); playRecording(parseInt(btn.dataset.play), btn); });
  });
  listEl.querySelectorAll('[data-dl]').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); downloadRecording(parseInt(btn.dataset.dl)); });
  });
  listEl.querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); deleteRecording(parseInt(btn.dataset.del)); });
  });
}

function playRecording(i, btn) {
  const r = recordings[i];
  if (!r.b64) return;
  if (currentPlayback) { currentPlayback.pause(); currentPlayback = null; }
  const audio = new Audio(r.b64);
  currentPlayback = audio;
  btn.classList.add('playing');
  audio.play();
  audio.onended = () => { btn.classList.remove('playing'); currentPlayback = null; };
}

function downloadRecording(i) {
  const r = recordings[i];
  if (!r.b64) return;
  const a = document.createElement('a');
  a.href = r.b64;
  a.download = `${r.name}.mp3`;
  a.click();
  showToast('MP3ダウンロード開始');
}

function deleteRecording(i) {
  recordings.splice(i, 1);
  try { localStorage.setItem('recordings', JSON.stringify(recordings)); } catch(e) {}
  renderList();
  showToast('削除しました');
}

// ── Toast ──────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

// ── Wake Lock ──────────────────────────────────────────
let wakeLock = null;
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
  }
}
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && isRecording) await requestWakeLock();
});

// ── Service Worker ──────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ── Init ──────────────────────────────────────────
renderList();
setUIIdle();

const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
if (isIOS && !window.navigator.standalone) {
  setTimeout(() => showToast('ホーム画面に追加するとバックグラウンド録音できます'), 2000);
}
</script>
